<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命運大廳</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="stars" id="stars"></div>
<div class="orb"></div>

<!-- ================= 大廳 ================= -->
<div class="container" id="lobbyPage">

    <div class="title">命運大廳</div>
    <div class="subtitle">選擇你想探索的命運之門</div>

    <div class="menu-grid">

        <div class="card" onclick="goTo('fortune')">
            <div class="card-content">
                <div class="icon">🔮</div>
                <h2>每日運勢</h2>
                <p>L1 隨機變數</p>
            </div>
        </div>

        <div class="card" onclick="goTo('love')">
            <div class="card-content">
                <div class="icon">🃏</div>
                <h2>塔羅占卜</h2>
                <p>L3 不同選項->不同結果</p>
            </div>
        </div>

        <div class="card" onclick="goTo('career')">
            <div class="card-content">
                <div class="icon">💼</div>
                <h2>星座命盤</h2>
                <p>性格與方向</p>
            </div>
        </div>

        <div class="card" onclick="goTo('llm')">
            <div class="card-content">
                <div class="icon">🤖</div>
                <h2>阿拉丁神燈</h2>
                <p>L7 LLM</p>
            </div>
        </div>

    </div>

</div>

<!-- ================= 運勢頁 ================= -->
<div id="fortunePage" class="page">

    <h1 class="fortune-title">🔮 每日運勢</h1>
    <p class="fortune-subtitle">點擊水晶球查看命運</p>

    <div class="crystal-ball" onclick="showFortune()">✨</div>

    <div class="fortune-result" id="fortuneResult">
        點擊水晶球後顯示結果
    </div>

    <button class="back-btn" onclick="backLobby()">返回大廳</button>
</div>

<!-- ================= 塔羅 ================= -->
<div id="lovePage" class="page">
    <h1 class="fortune-title">🃏 塔羅占卜</h1>
    <p class="fortune-subtitle">功能開發中</p>
    <button class="back-btn" onclick="backLobby()">返回大廳</button>
</div>

<!-- ================= 星座 ================= -->
<div id="careerPage" class="page">
    <h1 class="fortune-title">💼 星座命盤</h1>
    <p class="fortune-subtitle">功能開發中</p>
    <button class="back-btn" onclick="backLobby()">返回大廳</button>
</div>

<!-- ================= LLM ================= -->
<div id="llmPage" class="page">
    <h1 class="fortune-title">🍀 LLM</h1>
    <p class="fortune-subtitle">功能開發中</p>
    <button class="back-btn" onclick="backLobby()">返回大廳</button>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
